<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quy luật Quan hệ sản xuất - Tiểu luận Triết học Mác-Lênin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "sans-serif"] },
            colors: {
              brand: {
                50: "#eff6ff",
                100: "#dbeafe",
                200: "#bfdbfe",
                300: "#93c5fd",
                400: "#60a5fa",
                500: "#3b82f6",
                600: "#2563eb",
                700: "#1d4ed8",
                800: "#1e3a5f",
                900: "#0f172a",
              },
              accent: { gold: "#d97706", red: "#dc2626", green: "#059669", teal: "#0d9488" },
            },
          },
        },
      };
    </script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/reveal.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/theme/white.css" id="theme" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
      :root {
        --r-main-font: "Inter", sans-serif;
        --r-heading-font: "Inter", sans-serif;
        --r-main-font-size: 28px;
        --r-heading1-size: 2.2em;
        --r-heading2-size: 1.6em;
        --r-heading3-size: 1.2em;
        --r-background-color: #ffffff;
        --r-main-color: #1e293b;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      body,
      .reveal {
        font-family: var(--r-main-font) !important;
        background: #f8fafc;
        color: #1e293b;
      }
      .reveal h1,
      .reveal h2,
      .reveal h3,
      .reveal h4 {
        font-family: var(--r-heading-font) !important;
        text-transform: none;
        line-height: 1.3;
        color: #0f172a;
      }
      .reveal .slides section {
        padding: 40px;
        height: 100%;
        width: 100%;
        box-sizing: border-box;
      }
      .reveal p,
      .reveal li {
        line-height: 1.5;
        color: #334155;
      }
      .lucide {
        display: inline-block;
        vertical-align: middle;
      }
      .card-hover {
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .card-hover:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.07);
      }

      /* Custom fragment: zoom-in */
      .reveal .slides section .fragment.zoom-in {
        opacity: 0;
        transform: scale(0.6);
        transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .reveal .slides section .fragment.zoom-in.visible {
        opacity: 1;
        transform: scale(1);
      }

      .divider {
        height: 4px;
        width: 80px;
        background: linear-gradient(90deg, #3b82f6, #60a5fa);
        border-radius: 999px;
        margin: 0 auto;
      }
      .quote-box {
        border-left: 4px solid #3b82f6;
        background: #eff6ff;
        border-radius: 0 10px 10px 0;
        padding: 20px 28px;
      }
      .reveal .controls button {
        color: #3b82f6 !important;
      }
      .reveal .progress span {
        background: #3b82f6 !important;
      }
      .reveal .slide-background {
        background-color: #f8fafc;
      }
      /* Hiệu ứng nền ô li trên từng slide — ĐÃ TẮT */
      /*
      .reveal .slides section::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(148, 163, 184, 0.22) 1px, transparent 1px), linear-gradient(90deg, rgba(148, 163, 184, 0.22) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      */
      /* Đảm bảo nội dung slide nằm trên nền */
      .reveal .slides section > * {
        position: relative;
        z-index: 1;
      }

      /* Sidebar Navigator */
      #slide-nav {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        width: 56px;
        background: #1e293b;
        z-index: 9999;
        overflow-y: auto;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 8px 0;
        gap: 4px;
        transition: transform 0.3s ease;
        scrollbar-width: thin;
        scrollbar-color: #475569 #1e293b;
      }
      #slide-nav::-webkit-scrollbar {
        width: 4px;
      }
      #slide-nav::-webkit-scrollbar-track {
        background: #1e293b;
      }
      #slide-nav::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 4px;
      }
      #slide-nav .nav-btn {
        width: 40px;
        height: 36px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: #94a3b8;
        font-family: "Inter", sans-serif;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s ease;
        flex-shrink: 0;
      }
      #slide-nav .nav-btn:hover {
        background: #334155;
        color: #e2e8f0;
      }
      #slide-nav .nav-btn.active {
        background: #3b82f6;
        color: #fff;
      }
      /* Hide sidebar in fullscreen */
      :fullscreen #slide-nav,
      :-webkit-full-screen #slide-nav {
        transform: translateX(-100%);
      }
      /* Shift reveal when sidebar visible (not fullscreen) */
      .reveal {
        margin-left: 56px;
        width: calc(100% - 56px) !important;
      }
      :fullscreen .reveal,
      :-webkit-full-screen .reveal {
        margin-left: 0;
        width: 100% !important;
      }
      /* Global slide footer */
      .slide-footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 50;
        background: linear-gradient(to top, rgba(248, 250, 252, 0.97), rgba(248, 250, 252, 0.85));
        border-top: 2px solid #e2e8f0;
        padding: 10px 40px;
        text-align: center;
        pointer-events: none;
      }
      .slide-footer .footer-info {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 40px;
        margin-bottom: 4px;
      }
      .slide-footer .footer-info span {
        font-size: 13px;
        font-weight: 600;
        color: #64748b;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .slide-footer .footer-info b {
        color: #334155;
        font-weight: 700;
      }
      .slide-footer .footer-city {
        font-size: 13px;
        font-weight: 700;
        color: #94a3b8;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <!-- Sidebar Navigator -->
    <div id="slide-nav"></div>

    <div class="reveal">
      <div class="slides"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/reveal.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      // DỮ LIỆU RENDER COMPONENT
      // 1. Dữ liệu Timeline / Nội dung trình bày
      const timelineData = [
        {
          id: "01",
          hover: "brand",
          bgAccent: "brand-500",
          title: "Mở đầu & Cấu trúc phân tích",
          desc: "Khủng hoảng kinh tế và giới thiệu phương pháp tiếp cận triết học Mác-Lênin.",
        },
        {
          id: "02",
          hover: "teal",
          bgAccent: "accent-teal",
          title: "Lý luận Cơ bản: LLSX & QHSX",
          desc: "Nền tảng khái niệm về Lực lượng sản xuất và Quan hệ sản xuất.",
        },
        {
          id: "03",
          hover: "gold",
          bgAccent: "accent-gold",
          title: "Nội dung Quy luật Phù hợp",
          desc: "Sự tác động biện chứng giữa nội dung (LLSX) và hình thức (QHSX).",
        },
        {
          id: "04",
          hover: "red",
          bgAccent: "accent-red",
          title: "Sai lầm 1975–1985",
          desc: "Bài học đắt giá về sự phá vỡ quy luật dẫn đến khủng hoảng kinh tế.",
        },
        {
          id: "05",
          hover: "brand",
          bgAccent: "brand-500",
          title: "Đại hội VI & Đổi mới (1986)",
          desc: "Bước ngoặt lịch sử, chấp nhận kinh tế hàng hóa nhiều thành phần.",
        },
        {
          id: "06",
          hover: "teal",
          bgAccent: "accent-teal",
          title: "Công nghiệp hóa - Hiện đại hóa",
          desc: "Xây dựng thể chế kinh tế thị trường định hướng XHXN và nhân lực.",
        },
        {
          id: "07",
          hover: "gold",
          bgAccent: "accent-gold",
          title: "Kỷ nguyên AI & Dữ liệu lớn",
          desc: 'Sự bùng nổ của LLSX số và hiện tượng "Tha hóa dữ liệu".',
        },
        {
          id: "08",
          hover: "red",
          bgAccent: "accent-red",
          title: "Giải pháp Thiết lập QHSX Số",
          desc: "4 chiến lược bảo vệ con người, chốt lại toàn bộ tiểu luận.",
        },
      ];

      // 2. Dữ liệu Đội ngũ
      const viewMembers = [
        { name: "Bùi Tấn Phát", id: "25110289", type: "brand" },
        { name: "Nguyễn Khánh Cường", id: "25110157", type: "teal" },
        { name: "Nguyễn Ngô Anh Tú", id: "25110390", type: "amber" },
        { name: "Nguyễn Gia Thịnh", id: "25110348", type: "red" },
      ];

      const themeMap = {
        brand: { bg: "bg-brand-50", text: "text-brand-500", border: "border-brand-300", accent: "text-brand-600" },
        teal: { bg: "bg-teal-50", text: "text-accent-teal", border: "border-teal-300", accent: "text-teal-600" },
        amber: { bg: "bg-amber-50", text: "text-accent-gold", border: "border-amber-300", accent: "text-amber-600" },
        red: { bg: "bg-red-50", text: "text-accent-red", border: "border-red-300", accent: "text-red-600" },
      };

      // FUNC: LOAD EXTERNAL SLIDES
      async function loadSetup() {
        const slideCount = 41;
        const skipSlides = [3]; // Slide bị bỏ
        const slidesContainer = document.querySelector(".slides");

        for (let i = 1; i <= slideCount; i++) {
          if (skipSlides.includes(i)) continue; // Bỏ qua slide 3
          try {
            const res = await fetch("./slides/slide-" + i + ".html");
            if (res.ok) {
              const text = await res.text();
              slidesContainer.insertAdjacentHTML("beforeend", text);
            }
          } catch (e) {
            console.error("Error loading slide", i, e);
          }
        }

        // INIT: RENDER HTML TRƯỚC KHI KHỞI TẠO APP
        const timelineBox = document.getElementById("timeline-container");
        if (timelineBox) {
          timelineBox.innerHTML = timelineData
            .map(
              (item, index) => `
          <div class="fragment fade-up relative flex flex-col justify-start bg-white border-2 border-slate-200 p-8 rounded-3xl hover:border-${item.hover}-300 transition-colors" data-fragment-index="${index + 1}">
            <div class="absolute -top-6 left-8 bg-${item.bgAccent} text-white w-12 h-12 flex items-center justify-center rounded-xl font-black text-[22px]">${item.id}</div>
            <h3 class="text-[22px] font-bold text-slate-800 mt-4 mb-2 m-0 leading-tight">${item.title}</h3>
            <p class="text-[16px] text-slate-500 leading-snug m-0">${item.desc}</p>
          </div>
        `,
            )
            .join("");
        }

        const teamBox = document.getElementById("team-container");
        if (teamBox) {
          teamBox.innerHTML = viewMembers
            .map((member) => {
              const t = themeMap[member.type];
              return `
            <div class="fragment fade-up flex-1 border border-slate-200 rounded-3xl overflow-hidden text-center">
              <div class="${t.bg} py-12 flex flex-col items-center">
                <div class="w-[140px] h-[140px] rounded-full bg-white border-4 ${t.border} flex items-center justify-center ${t.text}">
                  <i data-lucide="user" class="w-16 h-16"></i>
                </div>
              </div>
              <div class="bg-white px-6 py-8 text-center flex flex-col items-center">
                <p class="text-[26px] font-bold text-slate-800 m-0 mb-4 whitespace-nowrap overflow-hidden text-ellipsis w-full">${member.name}</p>
                <p class="text-[18px] text-slate-600 m-0 mb-3 flex items-center justify-center gap-2">
                  <i data-lucide="id-card" class="w-5 h-5 text-slate-400"></i> ${member.id}
                </p>
                <p class="text-[15px] font-medium ${t.accent} m-0 flex items-center justify-center gap-2 ${t.bg} py-2 px-4 rounded-full">
                  <i data-lucide="mail" class="w-4 h-4"></i> ${member.id}@student.hcmute.edu.vn
                </p>
              </div>
            </div>
          `;
            })
            .join("");
        }

        // INIT REVEAL & ICONS
        Reveal.initialize({
          controls: true,
          progress: true,
          center: false,
          hash: true,
          transition: "slide",
          transitionSpeed: "default",
          backgroundTransition: "fade",
          autoAnimateEasing: "ease-in-out",
          autoAnimateDuration: 0.8,
          width: 1920,
          height: 1080,
          margin: 0,
          minScale: 0.1,
          maxScale: 3.0,
        });

        lucide.createIcons();
        Reveal.on("slidechanged", (e) => {
          lucide.createIcons();
          updateNavActive(e.indexh);
        });
        Reveal.on("fragmentshown", () => lucide.createIcons());

        // Build sidebar navigator
        buildSlideNav(slideCount);
      }

      function buildSlideNav(count) {
        const nav = document.getElementById("slide-nav");
        if (!nav) return;
        nav.innerHTML = "";
        for (let i = 0; i < count; i++) {
          const btn = document.createElement("button");
          btn.className = "nav-btn" + (i === 0 ? " active" : "");
          btn.textContent = i + 1;
          btn.title = "Slide " + (i + 1);
          btn.addEventListener("click", () => {
            // Jump to slide and show ALL fragments immediately (no step-by-step)
            const slide = Reveal.getSlides()[i];
            if (slide) {
              const frags = slide.querySelectorAll(".fragment");
              const maxFrag = frags.length;
              Reveal.slide(i, 0, maxFrag);
            } else {
              Reveal.slide(i);
            }
          });
          nav.appendChild(btn);
        }
      }

      function updateNavActive(index) {
        const btns = document.querySelectorAll("#slide-nav .nav-btn");
        btns.forEach((btn, i) => {
          btn.classList.toggle("active", i === index);
          if (i === index) btn.scrollIntoView({ block: "nearest", behavior: "smooth" });
        });
      }

      // Đăng ký Service Worker để cache ảnh & slide (1 năm)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').then(() => {
          console.log('✅ Service Worker registered - slides will be cached!');
        }).catch((err) => console.warn('SW registration failed:', err));
      }

      // Khởi động toàn bộ
      loadSetup();
    </script>
  </body>
</html>
